<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            font-family: 'Newsreader', serif;
            background-color: #0a0a0f;
            color: #e4e1e9;
        }
        .font-serif { font-family: 'Newsreader', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-sans { font-family: 'Manrope', sans-serif; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #35343a; }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scaleY(1); }
            50% { transform: translateY(-3px) scaleY(1.05); }
        }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; filter: blur(4px); }
            50% { opacity: 0.8; filter: blur(6px); }
        }
        .book-icon-animate {
            animation: breathe 4s ease-in-out infinite;
        }
        .glow-animate {
            animation: pulse-glow 4s ease-in-out infinite;
        }

        /* Transitions */
        .drawer-content {
            transition: transform 0.3s ease-in-out;
        }
        .drawer-hidden {
            transform: translateX(-100%);
        }
        .drawer-visible {
            transform: translateX(0);
        }

        /* Sidebar Expansion Logic */
        .main-wrapper {
            transition: padding-right 0.3s ease-in-out;
        }
        .sidebar-expanded .main-wrapper {
            padding-right: 400px;
        }
        .sidebar-collapsed .main-wrapper {
            padding-right: 0px;
        }

        @media (max-width: 1023px) {
            .sidebar-expanded .main-wrapper, .sidebar-collapsed .main-wrapper {
                padding-right: 0px;
            }
        }

        @media (min-width: 1024px) {
            .drawer-hidden {
                transform: translateX(0);
            }
            #detailsSheet {
                transition: transform 0.3s ease-in-out;
            }
            .sidebar-collapsed #detailsSheet {
                transform: translateX(100%);
            }
            .sidebar-expanded #detailsSheet {
                transform: translateX(0);
            }
        }

        /* FAB Position Logic */
        #fabToggle {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #fabIcon {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-expanded #fabToggle {
            transform: translateX(calc(-400px + 32px)) translateY(calc(-100vh + 104px));
        }
        @media (max-width: 1023px) {
            .sidebar-expanded #fabToggle {
                transform: translateY(calc(-90vh + 104px));
            }
        }
    </style>

<script>
function toggleDrawer() {
    const drawer = document.getElementById('navDrawer');
    const overlay = document.getElementById('navDrawerOverlay');
    const isDesktop = window.innerWidth >= 1024;

    if (isDesktop) return;

    drawer.classList.toggle('drawer-hidden');
    drawer.classList.toggle('drawer-visible');
    overlay.classList.toggle('opacity-0');
    overlay.classList.toggle('pointer-events-none');
    document.body.classList.toggle('overflow-hidden');
}

function isDetailsOpen() {
    return document.body.classList.contains('sidebar-expanded');
}

function syncFabState(isOpen) {
    const fabIcon = document.getElementById('fabIcon');
    if (!fabIcon) return;

    fabIcon.textContent = isOpen ? 'close' : 'add';
    fabIcon.style.transform = 'rotate(0deg)';
}

function setDetailsOpen(isOpen) {
    const body = document.body;
    const sheet = document.getElementById('detailsSheet');
    const overlay = document.getElementById('detailsOverlay');
    const isDesktop = window.innerWidth >= 1024;

    body.classList.toggle('sidebar-expanded', isOpen);
    body.classList.toggle('sidebar-collapsed', !isOpen);

    if (isDesktop) {
        body.classList.remove('overflow-hidden');
        overlay.classList.add('opacity-0', 'pointer-events-none');
        sheet.classList.remove('translate-y-full');
    } else {
        sheet.classList.toggle('translate-y-full', !isOpen);
        overlay.classList.toggle('opacity-0', !isOpen);
        overlay.classList.toggle('pointer-events-none', !isOpen);
        body.classList.toggle('overflow-hidden', isOpen);
    }

    syncFabState(isOpen);
}

function toggleDetails() {
    setDetailsOpen(!isDetailsOpen());
}

function showDetails() {
    setDetailsOpen(true);
}

function hideDetails() {
    setDetailsOpen(false);
}

function focusMobileSearch() {
    const mobileSearch = document.getElementById('mobileSearchInput');
    if (!mobileSearch) return;

    mobileSearch.scrollIntoView({ behavior: 'smooth', block: 'center' });
    window.setTimeout(() => mobileSearch.focus(), 150);
}

window.addEventListener('resize', () => {
    setDetailsOpen(isDetailsOpen());
});
</script>
